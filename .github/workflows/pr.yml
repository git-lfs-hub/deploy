name: PR

on:
  pull_request:

  workflow_dispatch: # Can run this workflow manually from the Actions tab

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TEAMID: ${{ vars.TURBO_TEAMID }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Initialize
        uses: ./.github/actions/init
        with:
          vars-json: ${{ vars.VARS_JSON || secrets.VARS_JSON }}

      - run: bunx turbo run test build

      - name: Turbo Summary
        uses: ./.github/actions/turbo-summary
