name: PR

on:
  pull_request:

  workflow_dispatch: # Can run this workflow manually from the Actions tab

env:
  GLH_VARS_JSON: ${{ vars.GLH_VARS_JSON || secrets.GLH_VARS_JSON }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
  TURBO_TEAMID: ${{ vars.TURBO_TEAMID || secrets.TURBO_TEAMID }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/init

      - run: bunx turbo run test build

      - name: Turbo Summary
        uses: ./.github/actions/turbo-summary

  deploy-staging:
    name: "Deploy staging"
    needs: test
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: lfs-server-staging
      cancel-in-progress: false
    env:
      GLH_VARS_JSON: ${{ vars.GLH_STAGING_VARS_JSON || secrets.GLH_STAGING_VARS_JSON }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: staging

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Reset rendered config so staging vars take effect
        run: rm -f vars.input.json vars.json

      - uses: ./.github/actions/init

      - name: Sanity-check rendered Worker name
        run: |
          name="$(jq -r '.cloudflare.workerName' vars.json)"
          if [ "$name" != "lfs-server-staging" ]; then
            echo "::error::expected lfs-server-staging, got '$name' — refusing to deploy"
            exit 1
          fi

      - run: bunx turbo run build --force

      - run: bunx wrangler deploy --minify
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  staging-test:
    name: "Staging tests"
    needs: deploy-staging
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: lfs-server-staging
      cancel-in-progress: false
    env:
      GLH_VARS_JSON: ${{ vars.GLH_STAGING_VARS_JSON || secrets.GLH_STAGING_VARS_JSON }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: staging

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Reset rendered config
        run: rm -f vars.input.json vars.json

      - uses: ./.github/actions/init

      - name: Read staging URLs from vars.json
        id: vars
        run: |
          echo "url=https://$(jq -r '.lfs.server' vars.json)" >> "$GITHUB_OUTPUT"
          echo "title=$(jq -r '.title' vars.json)" >> "$GITHUB_OUTPUT"

      - name: Docs staging test (Tier 2)
        run: ./staging/docs-test.sh
        env:
          STAGING_URL: ${{ steps.vars.outputs.url }}
          DOCS_TITLE: ${{ steps.vars.outputs.title }}
          GH_PAT: ${{ secrets.GLH_STAGING_GITHUB_PAT }}
          LOGIN_SECRET: ${{ secrets.GLH_STAGING_LOGIN_SECRET }}

      - name: Install git-lfs
        run: sudo apt-get update && sudo apt-get install -y git-lfs

      - name: LFS push staging test
        run: ./staging/lfs-push-test.sh
        env:
          LFS_URL: ${{ steps.vars.outputs.url }}/git-lfs-hub/test
          GH_PAT: ${{ secrets.GLH_STAGING_GITHUB_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
