name: PR

on:
  pull_request:

  workflow_dispatch: # Can run this workflow manually from the Actions tab

env:
  GLH_VARS_JSON: ${{ vars.GLH_VARS_JSON || secrets.GLH_VARS_JSON }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
  TURBO_TEAMID: ${{ vars.TURBO_TEAMID || secrets.TURBO_TEAMID }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/init

      - run: bunx turbo run test build

      - name: Turbo Summary
        uses: ./.github/actions/turbo-summary

  deploy-staging:
    name: "Deploy staging"
    needs: test
    if: github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: lfs-server-staging
      cancel-in-progress: false
    uses: git-lfs-hub/staging/.github/workflows/deploy.yml@main
    with:
      ref: ${{ github.event.pull_request.head.sha }}
      vars-json: ${{ vars.GLH_STAGING_VARS_JSON || secrets.GLH_STAGING_VARS_JSON }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  staging-test:
    name: "Staging tests"
    needs: deploy-staging
    if: github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: lfs-server-staging
      cancel-in-progress: false
    uses: git-lfs-hub/staging/.github/workflows/test.yml@main
    with:
      ref: ${{ github.event.pull_request.head.sha }}
      vars-json: ${{ vars.GLH_STAGING_VARS_JSON || secrets.GLH_STAGING_VARS_JSON }}
      pr-number: ${{ github.event.pull_request.number }}
      run-id: ${{ github.run_id }}
    secrets:
      GH_PAT: ${{ secrets.GLH_STAGING_GITHUB_PAT }}
      LOGIN_SECRET: ${{ secrets.GLH_STAGING_LOGIN_SECRET }}
