name: PR

on:
  pull_request:
  workflow_dispatch: # Can run manually from the Actions tab

jobs:
  ci:
    name: "CI"
    uses: git-lfs-hub/ci-cd/.github/workflows/ci.yml@wip
    secrets: inherit

  staging:
    name: "Staging"
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: git-lfs-hub/ci-cd/.github/workflows/staging.yml@wip
    with:
      vars-json: ${{ vars.GLH_VARS_JSON }}
    secrets: inherit
