name: Upstream

on:
  push: { branches: ["main"] }
  pull_request:

permissions:
  contents: read

jobs:
  upstream:
    name: Check pre-commit
    if: vars.GLH_UPSTREAM == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: scripts/upstream.sh pre-commit
        shell: bash
