name: Main

on:
  push: { branches: ["main"] }
  workflow_dispatch: # Can run manually from the Actions tab

permissions: {}

jobs:
  ci:
    name: "CI"
    uses: git-lfs-hub/ci-cd/.github/workflows/ci.yml@wip
    secrets: inherit

  cd:
    name: "CD"
    needs: ci
    uses: git-lfs-hub/ci-cd/.github/workflows/cd.yml@wip
    secrets: inherit

  e2e:
    name: "E2E"
    needs: cd
    uses: git-lfs-hub/ci-cd/.github/workflows/e2e.yml@wip
    secrets: inherit
    permissions:
      contents: write
