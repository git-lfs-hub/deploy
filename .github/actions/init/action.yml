name: "Init"
description: "Checkout, set up Bun, and install root dependencies (frozen lockfile)"

runs:
  using: "composite"
  steps:
    - name: Set environment variables
      run: echo 'TURBO_RUN_SUMMARY=true' >> $GITHUB_ENV
      shell: bash

    - uses: actions/setup-node@v6
      with:
        node-version-file: "server/package.json"

    - uses: oven-sh/setup-bun@v2

    - name: Cache bun dependencies
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

    - run: bun install --frozen-lockfile
      shell: bash

    - name: Initialize vars
      env:
        VARS_JSON: ${{ env.VARS_JSON || vars.VARS_JSON || secrets.VARS_JSON }}
      run: |
        if [ -n "$VARS_JSON" ]; then
          printf '%s\n' "$VARS_JSON" > vars.json
        fi
        bunx turbo init
      shell: bash
